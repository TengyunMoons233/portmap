<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>全球基本港地图 · 深圳惠海国际</title>
<style>
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }

/* ── Ambient background ── */
html,body{
  height:100%; width:100%;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  overflow:hidden;
  background:#0a0e1a;
  color:#f2f2f7;
  -webkit-font-smoothing:antialiased;
}

/* Canvas for animated orbs */
#bg-canvas{
  position:fixed; inset:0; z-index:0;
  pointer-events:none;
}

/* ── Frosted glass card ── */
.lock-wrap{
  position:relative; z-index:10;
  height:100vh; display:flex;
  align-items:center; justify-content:center;
  padding:20px;
}

.lock-card{
  width:100%; max-width:400px;
  background:rgba(28,28,32,0.80);
  backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  border:1px solid rgba(255,255,255,0.10);
  border-radius:24px;
  padding:40px 36px 36px;
  box-shadow:
    0 32px 80px rgba(0,0,0,0.60),
    0 0 0 0.5px rgba(255,255,255,0.08) inset,
    0 1px 0 rgba(255,255,255,0.12) inset;
  animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes cardIn{
  from{ opacity:0; transform:translateY(28px) scale(0.96); }
  to  { opacity:1; transform:translateY(0)     scale(1); }
}

/* ── Logo ── */
.lock-logo{
  width:64px; height:64px;
  background:linear-gradient(145deg,#0A84FF 0%,#32ADE6 50%,#30D158 100%);
  border-radius:18px;
  display:flex; align-items:center; justify-content:center;
  font-size:30px;
  margin:0 auto 20px;
  box-shadow:
    0 8px 32px rgba(0,122,255,0.40),
    0 0 0 1px rgba(255,255,255,0.15) inset;
  animation: logoFloat 4s ease-in-out infinite;
}
@keyframes logoFloat{
  0%,100%{ transform:translateY(0); }
  50%     { transform:translateY(-5px); }
}

/* ── Title text ── */
.lock-title{
  text-align:center;
  font-size:20px; font-weight:700;
  letter-spacing:-0.4px;
  color:#f2f2f7;
  margin-bottom:4px;
}
.lock-sub{
  text-align:center;
  font-size:12px; color:rgba(255,255,255,0.40);
  margin-bottom:30px;
  letter-spacing:0.2px;
}

/* ── Password field ── */
.field-wrap{
  position:relative; margin-bottom:14px;
}
.field-label{
  font-size:11px; font-weight:600;
  color:rgba(255,255,255,0.45);
  letter-spacing:0.5px; text-transform:uppercase;
  margin-bottom:7px;
  display:block;
}
.field-input{
  width:100%;
  padding:13px 44px 13px 16px;
  background:rgba(255,255,255,0.06);
  border:1.5px solid rgba(255,255,255,0.10);
  border-radius:13px;
  color:#f2f2f7;
  font-size:15px;
  font-family:inherit;
  letter-spacing:2px;
  outline:none;
  transition:all 0.2s cubic-bezier(0.16,1,0.3,1);
  caret-color:#0A84FF;
}
.field-input::placeholder{
  color:rgba(255,255,255,0.20);
  letter-spacing:0.5px;
  font-size:13px;
}
.field-input:focus{
  border-color:rgba(10,132,255,0.70);
  background:rgba(10,132,255,0.08);
  box-shadow:
    0 0 0 4px rgba(10,132,255,0.15),
    0 2px 12px rgba(0,0,0,0.30);
}
.field-input.shake{
  animation:shake 0.5s cubic-bezier(.36,.07,.19,.97);
  border-color:rgba(255,59,48,0.70) !important;
  box-shadow:0 0 0 4px rgba(255,59,48,0.15) !important;
}
@keyframes shake{
  10%,90%  { transform:translateX(-2px); }
  20%,80%  { transform:translateX( 4px); }
  30%,50%,70% { transform:translateX(-6px); }
  40%,60%  { transform:translateX( 6px); }
}

/* Eye toggle */
.eye-btn{
  position:absolute; right:13px; bottom:13px;
  width:22px; height:22px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:rgba(255,255,255,0.30);
  transition:color 0.15s; font-size:14px;
  background:none; border:none; padding:0;
}
.eye-btn:hover{ color:rgba(255,255,255,0.70); }

/* ── Submit button ── */
.lock-btn{
  width:100%; padding:14px;
  background:linear-gradient(135deg,#007AFF 0%,#0A84FF 100%);
  border:none; border-radius:13px;
  color:white; font-size:15px; font-weight:700;
  font-family:inherit; cursor:pointer;
  transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:
    0 4px 20px rgba(0,122,255,0.42),
    0 1px 0 rgba(255,255,255,0.20) inset;
  letter-spacing:0.2px;
  position:relative; overflow:hidden;
}
.lock-btn::before{
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);
  border-radius:inherit;
}
.lock-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 28px rgba(0,122,255,0.55), 0 1px 0 rgba(255,255,255,0.20) inset;
  background:linear-gradient(135deg,#0A84FF 0%,#32ADE6 100%);
}
.lock-btn:active{ transform:translateY(0); box-shadow:0 2px 10px rgba(0,122,255,0.35); }
.lock-btn:disabled{
  opacity:0.6; cursor:not-allowed;
  transform:none;
  box-shadow:none;
}

/* ── Status messages ── */
.lock-status{
  margin-top:12px; height:20px;
  text-align:center; font-size:12px;
  transition:all 0.2s;
}
.lock-status.err{ color:#FF453A; }
.lock-status.ok { color:#30D158; }

/* ── Progress bar ── */
.progress-wrap{
  height:3px; background:rgba(255,255,255,0.08);
  border-radius:3px; margin-top:16px; overflow:hidden;
  opacity:0; transition:opacity 0.2s;
}
.progress-wrap.show{ opacity:1; }
.progress-bar{
  height:100%; width:0%;
  background:linear-gradient(90deg,#007AFF,#32ADE6,#30D158);
  border-radius:3px;
  transition:width 0.3s ease;
  background-size:200% 100%;
  animation:progressShimmer 1.5s linear infinite;
}
@keyframes progressShimmer{
  0%  { background-position:100% 0; }
  100%{ background-position:-100% 0; }
}

/* ── Footer ── */
.lock-footer{
  margin-top:24px; text-align:center;
  font-size:10.5px; color:rgba(255,255,255,0.22);
  line-height:1.6;
}
.lock-footer b{ color:rgba(255,255,255,0.40); font-weight:600; }

/* ── Dots decoration ── */
.dots-row{
  display:flex; justify-content:center; gap:6px; margin-bottom:26px;
}
.dot{
  width:8px; height:8px; border-radius:50%;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.12);
  transition:all 0.15s;
}
.dot.filled{
  background:#0A84FF;
  border-color:#0A84FF;
  box-shadow:0 0 8px rgba(10,132,255,0.60);
}

/* Loading spinner overlay */
#spinner{
  display:none; position:fixed; inset:0; z-index:100;
  background:rgba(10,14,26,0.92);
  backdrop-filter:blur(20px);
  align-items:center; justify-content:center;
  flex-direction:column; gap:16px;
}
#spinner.show{ display:flex; }
.spin-ring{
  width:52px; height:52px;
  border:3px solid rgba(255,255,255,0.10);
  border-top-color:#0A84FF;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{ to{ transform:rotate(360deg); } }
.spin-text{
  font-size:13px; color:rgba(255,255,255,0.50);
  letter-spacing:0.3px;
}
</style>
</head>

<script>
// ── Animated orb background ────────────────────────────────
(function(){
  const cvs = document.getElementById('bg-canvas');
  const ctx  = cvs.getContext('2d');
  let w, h, orbs;
  function resize(){ w=cvs.width=innerWidth; h=cvs.height=innerHeight; }
  window.addEventListener('resize', resize); resize();
  const palette = ['#0A84FF','#32ADE6','#30D158','#BF5AF2','#FF9500'];
  orbs = Array.from({length:5},(_,i)=>{
    return {
      x:Math.random()*w, y:Math.random()*h,
      r:150+Math.random()*180,
      vx:(Math.random()-.5)*0.35,
      vy:(Math.random()-.5)*0.35,
      color:palette[i],
      phase:Math.random()*Math.PI*2
    };
  });
  function draw(t){
    ctx.clearRect(0,0,w,h);
    orbs.forEach(o=>{
      o.x+=o.vx; o.y+=o.vy; o.phase+=0.007;
      if(o.x<-o.r) o.x=w+o.r;
      if(o.x>w+o.r) o.x=-o.r;
      if(o.y<-o.r) o.y=h+o.r;
      if(o.y>h+o.r) o.y=-o.r;
      const p=1+Math.sin(o.phase)*0.09;
      const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r*p);
      g.addColorStop(0,o.color+'44');
      g.addColorStop(0.5,o.color+'14');
      g.addColorStop(1,o.color+'00');
      ctx.fillStyle=g;
      ctx.beginPath(); ctx.arc(o.x,o.y,o.r*p,0,Math.PI*2); ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

// ── Dot fill animation ────────────────────────────────────
const pwInput = document.getElementById('pw');
pwInput.addEventListener('input', ()=>{
  const len = Math.min(pwInput.value.length, 8);
  for(let i=0;i<8;i++){
    document.getElementById('d'+i).classList.toggle('filled', i<len);
  }
});

// ── Eye button ────────────────────────────────────────────
document.getElementById('eye-btn').addEventListener('click', ()=>{
  const inp = document.getElementById('pw');
  inp.type = inp.type==='password' ? 'text' : 'password';
});

// ── Enter key ─────────────────────────────────────────────
pwInput.addEventListener('keydown', e=>{ if(e.key==='Enter') doUnlock(); });

async function doUnlock(){
  const pw = document.getElementById('pw').value.trim();
  if(!pw){ shake('请输入密码'); return; }

  const btn = document.getElementById('unlock-btn');
  btn.disabled = true;
  btn.textContent = '验证中…';

  const wrap = document.getElementById('prog-wrap');
  const bar  = document.getElementById('prog-bar');
  wrap.classList.add('show');

  setStatus('');

  try{
    // Decode payload
    const salt  = b64decode(PAYLOAD.s);
    const nonce = b64decode(PAYLOAD.n);
    const cipher= b64decode(PAYLOAD.c);

    bar.style.width = '20%';
    setStatus('正在推导密钥…', '');

    // PBKDF2
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
      'raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']
    );
    bar.style.width = '50%';

    const aesKey = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt, iterations:PAYLOAD.i, hash:'SHA-256' },
      keyMaterial,
      { name:'AES-GCM', length:256 },
      false, ['decrypt']
    );
    bar.style.width = '75%';
    setStatus('正在解密内容…', '');

    // Decrypt
    const plain = await crypto.subtle.decrypt(
      { name:'AES-GCM', iv:nonce },
      aesKey, cipher
    );
    bar.style.width = '100%';
    setStatus('解密成功，加载中…', 'ok');

    // Show spinner
    const sp = document.getElementById('spinner');
    sp.classList.add('show');

    // Replace page
    setTimeout(()=>{
      const html = new TextDecoder().decode(plain);
      document.open(); document.write(html); document.close();
    }, 300);

  } catch(e){
    bar.style.width = '0%';
    wrap.classList.remove('show');
    shake('密码错误，请重试');
    btn.disabled = false;
    btn.textContent = '进入地图';
  }
}

function shake(msg){
  const inp = document.getElementById('pw');
  inp.classList.remove('shake');
  void inp.offsetWidth;
  inp.classList.add('shake');
  setStatus(msg, 'err');
  inp.value = '';
  for(let i=0;i<8;i++) document.getElementById('d'+i).classList.remove('filled');
  setTimeout(()=>inp.classList.remove('shake'), 600);
}

function setStatus(msg, cls=''){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'lock-status' + (cls ? ' '+cls : '');
}

function b64decode(str){
  const bin = atob(str);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return arr;
}
