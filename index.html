  /* ── Lock Screen ── */
  #lock-screen{
    position:fixed;inset:0;z-index:99999;

    background:radial-gradient(ellipse at 50% 40%, #162540 0%, #0a1520 70%);

  .lock-sub{font-size:11px;color:#4a7090;margin-bottom:24px;letter-spacing:.3px}
  #pwd-input{
    width:100%;padding:11px 14px;font-size:14px;font-family:inherit;
    background:#0e1c2f;border:1px solid #2a4066;border-radius:8px;
    color:#e8f4fd;outline:none;letter-spacing:2px;text-align:center;
    transition:.2s border-color;
  }
  #pwd-input:focus{border-color:#29b6f6}
  #pwd-input.shake{animation:shake .35s ease}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
  #unlock-btn{

    background:linear-gradient(90deg,#29b6f6,#26a69a);
    border:none;border-radius:8px;color:#0e1c2f;cursor:pointer;
    font-family:inherit;letter-spacing:.5px;transition:.2s opacity;
  }
  #unlock-btn:hover{opacity:.85}
  #unlock-btn:disabled{opacity:.5;cursor:not-allowed}
  #err-msg{font-size:11px;color:#ef5350;margin-top:10px;min-height:16px;transition:.2s}
  #progress-wrap{margin-top:14px;display:none}
  #progress-bar{height:3px;background:rgba(41,182,246,.15);border-radius:2px;overflow:hidden}
  #progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#29b6f6,#26a69a);border-radius:2px;transition:width .1s}
  #progress-label{font-size:10px;color:#4a7090;margin-top:6px}
  .lock-footer{font-size:9.5px;color:#2e4d6a;margin-top:20px;line-height:1.7}

  /* ── Content frame ── */
  #content-frame{
    position:fixed;inset:0;width:100%;height:100%;
    border:none;display:none;
  }

// ── Anti-devtools (best-effort layer; real security = encryption) ──
(function(){
  let devOpen = false;
  const threshold = 160;
  setInterval(()=>{
    const w = window.outerWidth - window.innerWidth;
    const h = window.outerHeight - window.innerHeight;
    if(!devOpen && (w > threshold || h > threshold)){
      devOpen = true;
    }
  }, 1000);
  // Disable right-click context menu on lock screen
  document.addEventListener('contextmenu', e => e.preventDefault());
  // Trap debugger (slows down devtools stepping but doesn't block)
  // Note: this is cosmetic; real protection = AES ciphertext
})();

// ── Helpers ──────────────────────────────────────────────────────
function b64ToBytes(b64){
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return bytes;
}

function setProgress(pct, label){
  document.getElementById('progress-fill').style.width = pct + '%';
  if(label) document.getElementById('progress-label').textContent = label;
}

let unlocking = false;

async function unlock(){
  if(unlocking) return;
  const pwd = document.getElementById('pwd-input').value;
  if(!pwd){ shake(); return; }

  unlocking = true;
  const btn = document.getElementById('unlock-btn');
  btn.disabled = true;
  document.getElementById('err-msg').textContent = '';
  document.getElementById('progress-wrap').style.display = 'block';
  setProgress(5, '正在解析密钥参数…');

  // Small delay so UI can render before heavy PBKDF2 work
  await new Promise(r => setTimeout(r, 30));

  try {
    const salt      = b64ToBytes(PAYLOAD.s);
    const nonce     = b64ToBytes(PAYLOAD.n);
    const cipher    = b64ToBytes(PAYLOAD.c);
    const iterations = PAYLOAD.i;

    setProgress(10, '正在派生密钥 (PBKDF2-SHA256)…');
    await new Promise(r => setTimeout(r, 20));

    // Import raw password bytes
    const enc = new TextEncoder();
    const rawKey = await crypto.subtle.importKey(
      'raw', enc.encode(pwd), {name:'PBKDF2'}, false, ['deriveKey']
    );

    setProgress(20, `正在运算 ${(iterations/1000).toFixed(0)}k 轮哈希…`);
    await new Promise(r => setTimeout(r, 20));

    // Derive AES-256-GCM key
    const aesKey = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt, iterations, hash:'SHA-256'},
      rawKey,
      {name:'AES-GCM', length:256},
      false,
      ['decrypt']
    );

    setProgress(75, '正在解密内容…');
    await new Promise(r => setTimeout(r, 20));

    // Decrypt
    let plainBuf;
    try {
      plainBuf = await crypto.subtle.decrypt(
        {name:'AES-GCM', iv:nonce},
        aesKey,
        cipher
      );
    } catch(_){
      // Wrong password → decryption fails
      throw new Error('WRONG_PWD');
    }

    setProgress(95, '正在加载…');
    await new Promise(r => setTimeout(r, 30));

    const html = new TextDecoder().decode(plainBuf);

    // Render into iframe (keeps decrypted DOM in separate context)
    const frame = document.getElementById('content-frame');
    frame.style.display = 'block';
    document.getElementById('lock-screen').style.display = 'none';

    // Write decrypted HTML into iframe
    const doc = frame.contentDocument || frame.contentWindow.document;
    doc.open();
    doc.write(html);
    doc.close();

    setProgress(100, '完成');

  } catch(err){
    unlocking = false;
    btn.disabled = false;
    document.getElementById('progress-wrap').style.display = 'none';
    setProgress(0);
    if(err.message === 'WRONG_PWD'){
      document.getElementById('err-msg').textContent = '❌ 密码错误，请重试';
    } else {
      document.getElementById('err-msg').textContent = '❌ 解密失败: ' + err.message;
    }
    shake();
  }
}

function shake(){
  const inp = document.getElementById('pwd-input');
  inp.classList.remove('shake');
  void inp.offsetWidth;
  inp.classList.add('shake');
}

// Allow Enter key to submit
document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('pwd-input').addEventListener('keydown', e=>{
    if(e.key === 'Enter') unlock();
  });
});
</script>
