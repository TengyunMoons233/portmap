<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球基本港地图 | 请验证身份</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#0e1c2f 0%,#162540 50%,#0e1c2f 100%);
    font-family:'Noto Sans SC','Microsoft YaHei',sans-serif;
    position:relative;overflow:hidden;
  }
  body::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at 30% 40%, rgba(41,182,246,.08) 0%, transparent 60%),
               radial-gradient(ellipse at 70% 70%, rgba(38,166,154,.06) 0%, transparent 60%);
    pointer-events:none;
  }
  .card{
    background:linear-gradient(145deg,rgba(22,37,64,.97),rgba(28,47,80,.97));
    border:1px solid rgba(41,182,246,.25);
    border-radius:20px;
    padding:44px 40px 36px;
    width:380px;max-width:92vw;
    box-shadow:0 24px 64px rgba(0,0,0,.6),0 0 0 1px rgba(41,182,246,.1),inset 0 1px 0 rgba(255,255,255,.05);
    position:relative;
    backdrop-filter:blur(20px);
  }
  .logo-wrap{text-align:center;margin-bottom:28px}
  .logo-icon{
    width:60px;height:60px;margin:0 auto 14px;
    background:linear-gradient(135deg,#00acc1,#29b6f6,#26a69a);
    border-radius:16px;display:flex;align-items:center;justify-content:center;
    font-size:28px;box-shadow:0 8px 24px rgba(41,182,246,.35);
  }
  .logo-title{font-size:17px;font-weight:700;color:#e8f4fd;letter-spacing:.5px;margin-bottom:5px}
  .logo-sub{font-size:10.5px;color:#4a7090;letter-spacing:.3px}
  .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(41,182,246,.3),transparent);margin:0 -40px 24px}
  .label{font-size:11px;color:#90b8d8;margin-bottom:8px;display:block;letter-spacing:.3px}
  .input-wrap{position:relative;margin-bottom:20px}
  .pwd-input{
    width:100%;padding:12px 44px 12px 16px;
    background:rgba(14,28,47,.8);
    border:1.5px solid rgba(42,64,102,.8);
    border-radius:10px;color:#e8f4fd;font-size:14px;
    font-family:inherit;outline:none;transition:.2s all;
    letter-spacing:.5px;
  }
  .pwd-input:focus{border-color:rgba(41,182,246,.7);box-shadow:0 0 0 3px rgba(41,182,246,.12)}
  .eye-btn{
    position:absolute;right:12px;top:50%;transform:translateY(-50%);
    background:none;border:none;cursor:pointer;color:#4a7090;font-size:16px;
    padding:4px;transition:.15s;
  }
  .eye-btn:hover{color:#29b6f6}
  .submit-btn{
    width:100%;padding:13px;
    background:linear-gradient(135deg,#0277bd,#29b6f6);
    border:none;border-radius:10px;color:#fff;
    font-size:13.5px;font-weight:700;font-family:inherit;
    cursor:pointer;transition:.2s all;letter-spacing:.5px;
    box-shadow:0 4px 16px rgba(41,182,246,.3);
    position:relative;overflow:hidden;
  }
  .submit-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(41,182,246,.4)}
  .submit-btn:active:not(:disabled){transform:translateY(0)}
  .submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
  .err{
    margin-top:14px;padding:10px 14px;
    background:rgba(229,57,53,.12);border:1px solid rgba(229,57,53,.3);
    border-radius:8px;color:#ef9a9a;font-size:11px;text-align:center;
    display:none;animation:shake .3s ease;
  }
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .loading{
    display:none;text-align:center;margin-top:14px;
    color:#29b6f6;font-size:11px;
  }
  .spinner{
    display:inline-block;width:16px;height:16px;vertical-align:middle;margin-right:6px;
    border:2px solid rgba(41,182,246,.3);border-top-color:#29b6f6;
    border-radius:50%;animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .tries{text-align:center;margin-top:12px;font-size:10px;color:#2e4d6a}
  .lock-icon{font-size:11px;margin-right:4px}
  .footer-note{text-align:center;margin-top:20px;font-size:9.5px;color:#2e4d6a;line-height:1.6}
</style>
</head>

const PBKDF2_ITER = 200000;
// ─────────────────────────────────────────────────────────────────────

let tries = 0;
let locked = false;

function b64ToBytes(b64){
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return arr;
}

function toggleEye(){
  const inp = document.getElementById('pwd');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

document.getElementById('pwd').addEventListener('keydown', e => {
  if(e.key === 'Enter') unlock();
});

async function unlock(){
  if(locked) return;
  const pwd = document.getElementById('pwd').value;
  if(!pwd){ shake(); return; }

  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errMsg');
  const loading = document.getElementById('loadingMsg');
  const triesMsg = document.getElementById('triesMsg');

  err.style.display = 'none';
  btn.disabled = true;
  loading.style.display = 'block';

  try {
    // Derive key with PBKDF2
    const enc = new TextEncoder();
    const rawKey = await crypto.subtle.importKey('raw', enc.encode(pwd), 'PBKDF2', false, ['deriveKey']);
    const aesKey = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt:b64ToBytes(SALT_B64), iterations:PBKDF2_ITER, hash:'SHA-256' },
      rawKey,
      { name:'AES-GCM', length:256 },
      false, ['decrypt']
    );

    // Decrypt AES-GCM
    const iv = b64ToBytes(IV_B64);
    const ct = b64ToBytes(CT_B64);
    let plainBuf;
    try {
      plainBuf = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, aesKey, ct);
    } catch(_) {
      throw new Error('wrong_password');
    }

    // Success — write decrypted HTML into page
    const html = new TextDecoder('utf-8').decode(plainBuf);
    document.open();
    document.write(html);
    document.close();

  } catch(e) {
    loading.style.display = 'none';
    btn.disabled = false;
    tries++;
    err.textContent = '❌ 密码错误，请重试 (' + tries + ')';
    err.style.display = 'block';
    err.style.animation = 'none';
    void err.offsetWidth;
    err.style.animation = 'shake .3s ease';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();

    if(tries >= 5){
      locked = true;
      btn.disabled = true;
      triesMsg.textContent = '⚠️ 错误次数过多，请刷新页面重试';
      err.textContent = '🔒 已锁定，请刷新页面';
    }
  }
}
</script>
